services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rankify:rankify@postgres:5432/rankify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TSOFT_API_URL: ${TSOFT_API_URL}
      TSOFT_API_USER: ${TSOFT_API_USER}
      TSOFT_API_PASS: ${TSOFT_API_PASS}
      TSOFT_STORE_CODE: ${TSOFT_STORE_CODE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rankify
      POSTGRES_PASSWORD: rankify
      POSTGRES_DB: rankify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankify"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
